server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/bdttf}
    username: ${DATASOURCE_USER:root}
    password: ${DATASOURCE_PWD:}
    driver-class-name: ${DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: update   # create, create-drop, validate, none, update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  application:
    name: comunidadettf

app:
  security:
    jwt:
      secret: ${JWT_SECRET:troque-essa-chave-super-segura-para-o-spring-ttf-123456}
      ttl-minutes: ${JWT_TTL_MINUTES:120}
